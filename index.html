<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roma Explorer 🏛️ - Tu guía Premium</title>
    
    <!-- Meta tags PWA -->
    <meta name="theme-color" content="#c9a84c">
    <meta name="description" content="Explora los secretos de Roma con nuestra guía premium.">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Fuentes y Iconos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <!-- Estilos Propios -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <!-- Pantalla de Carga -->
    <div id="loader" class="loader-container">
        <div class="loader-content">
            <span class="loader-icon">🏛️</span>
            <h1>Roma Explorer</h1>
            <div class="progress-bar"><div class="progress"></div></div>
        </div>
    </div>

    <!-- Header Principal -->
    <header class="main-header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🏛️</span>
                <h1>Roma</h1>
            </div>
            <button id="theme-toggle" class="icon-btn">
                <i class="ph ph-moon"></i>
            </button>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main id="app-container">
        
        <!-- Vista Explorar (Lista/Tarjetas) -->
        <section id="view-explore" class="app-view active">
            <div class="search-container">
                <div class="search-bar">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="poi-search" placeholder="Buscar monumentos, plazas...">
                </div>
                <div class="view-ctrl">
                    <button id="toggle-view-btn" class="icon-btn" title="Cambiar vista">
                        <i class="ph ph-squares-four"></i>
                    </button>
                </div>
            </div>

            <div class="filter-pills-container">
                <div class="filter-pills" id="category-filters">
                    <button class="pill active" data-category="todos">Todos</button>
                    <button class="pill" data-category="cultura">Cultura</button>
                    <button class="pill" data-category="museos">Museos</button>
                    <button class="pill" data-category="restaurantes">Comer</button>
                    <button class="pill" data-category="parques">Parques</button>
                    <button class="pill" data-category="mercados">Mercados</button>
                </div>
            </div>

            <div id="poi-container" class="cards-grid">
                <!-- Se llenará dinámicamente -->
            </div>
        </section>

        <!-- Vista Mapa -->
        <section id="view-map" class="app-view">
            <div id="map-container"></div>
        </section>

        <!-- Vista Clima -->
        <section id="view-weather" class="app-view">
            <div class="weather-card">
                <div id="current-weather">
                    <!-- Clima actual -->
                </div>
                <div class="weather-forecast" id="forecast-container">
                    <!-- Pronóstico 7 días -->
                </div>
            </div>
        </section>

    </main>

    <!-- Navegación Inferior -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-view="explore">
            <i class="ph ph-compass"></i>
            <span>Explorar</span>
        </button>
        <button class="nav-item" data-view="map">
            <i class="ph ph-map-trifold"></i>
            <span>Mapa</span>
        </button>
        <button class="nav-item" data-view="weather">
            <i class="ph ph-cloud-sun"></i>
            <span>Clima</span>
        </button>
    </nav>

    <!-- Modal de Detalle -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <button class="close-modal"><i class="ph ph-x"></i></button>
            <div id="modal-body">
                <!-- Se llena al hacer click en una tarjeta -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/clima.js"></script>
    <script src="js/mapa.js"></script>
    <script src="js/app.js"></script>
    
    <!-- Registro de Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('✅ sw registrado', reg))
                    .catch(err => console.log('❌ sw fallo', err));
            });
        }
    </script>
</body>
</html>
